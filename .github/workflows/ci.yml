name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout orion-containers (sibling)
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-containers
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          path: orion:containers

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        env:
          PluginsSiblingRoot: ${{ github.workspace }}
        run: dotnet build OrionInventory.csproj -c Release
